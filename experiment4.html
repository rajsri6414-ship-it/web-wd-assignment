<!DOCTYPE html>
<html>

<head>
    <title>Student Marks Calculator</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f2f2f2;
        }

        .box {
            background: white;
            width: 300px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
        }

        input,
        button {
            margin: 5px;
            padding: 5px;
        }
    </style>

</head>

<body>

    <div class="box">

        <h2>Student Calculator</h2>

        Enter No. of Subjects:
        <input type="number" id="subjects">

        <br><br>

        <button onclick="calculate()">Calculate</button>

        <p id="result"></p>

    </div>
    <script>
        function calculate() {
            let subjects = document.getElementById("subjects").value;
            let marks = 0;
            for (let i = 1; i <= subjects; i++) {
                marks += parseInt(prompt("Enter marks for subject " + i));
            }
            let average = marks / subjects;
            let resultText = "Total Marks: " + marks + "<br>Average Marks: " + average + "<br>";
            if (average >= 50) {
                resultText += "Result: Pass";
            } else {
                resultText += "Result: Fail";
            }
            document.getElementById("result").innerHTML = resultText;
        }
    </script>

</body>

</html>
