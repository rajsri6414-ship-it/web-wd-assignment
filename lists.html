<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lists</title>
</head>
<body>lists
  <h1>Lists in HTML</h1>

  <h2>Ordered List</h2>
  <ol type="A" start="3">
    <li>First item</li>
    <li>Second item</li>
    <li>Third item</li>
  </ol>

  <h2>Unordered List</h2>
  <ul>
    <li>Apple</li>
    <li>Banana</li>
    <li>Cherry</li>
  </ul>

  <h2>Nested Lists</h2>
  <ul>
    <li>Fruits
      <ul>
        <li>Apple</li>
        <li>Banana</li>
      </ul>
    </li>
    <li>Vegetables
      <ul>
        <li>Carrot</li>
        <li>Broccoli</li>
      </ul>
    </li>
  </ul>
  
</body>
</html
